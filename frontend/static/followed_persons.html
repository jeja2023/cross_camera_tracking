<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关注人员 - 跨域智能识别系统</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="stylesheet" href="/static/css/followed_persons.css"> <!-- 新的CSS文件 -->
</head>
<body>
    <header class="header">
        <div class="logo">关注人员</div>
        <nav>
            <!-- 无导航链接 -->
        </nav>
        <div class="user-info">
            <a href="/index" class="button home-button">返回主页</a>
            <span>欢迎, <span id="username-display"></span> (<span id="role-display"></span>)</span>
            <button id="logout-button">退出</button>
        </div>
    </header>

    <div class="container">
        <div class="person-list-section">
            <!-- 实时比对功能开关按钮占位符 -->
            <div class="realtime-comparison-toggle-container">
                <span id="realtimeComparisonStatusText">实时比对功能：加载中...</span>
                <button id="toggleRealtimeComparisonBtn" class="button" style="display:none;">切换</button>
            </div>
            
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>姓名</th>
                            <th>身份证号/ID</th>
                            <th>关注时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="followedPersonTableBody">
                        <!-- 关注人员信息将在这里加载 -->
                    </tbody>
                </table>

                <div class="pagination-controls">
                    <button id="firstPageBtn" class="pagination-button">首页</button>
                    <button id="prevPageBtn" disabled>上一页</button>
                    <span id="pageInfo">页码 1 / 1</span>
                    <button id="nextPageBtn" disabled>下一页</button>
                    <button id="lastPageBtn" class="pagination-button">尾页</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 模态框用于显示预警和注册图片 -->
    <div id="imageModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2 id="modalTitle"></h2>
            <div id="imageGallery" class="image-gallery"></div>
            <div class="modal-navigation">
                <button id="prevImageBtn">&lt; 上一张</button>
                <span id="imageCounter"></span>
                <button id="nextImageBtn">下一张 &gt;</button>
            </div>
        </div>
    </div>

    <script src="/static/js/auth.js" type="module"></script>
    <script src="/static/js/common.js" type="module"></script>
    <script src="/static/js/followed_persons.js" type="module"></script> <!-- 新的JS文件 -->
</body>
</html>
