<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自动追踪 - 跨域智能识别系统</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <link rel="stylesheet" href="/static/css/auto_tracking.css">
    </head>
<body>
    <header class="header">
        <div class="logo">自动追踪</div>
        <nav>
            <button id="historyTrackingBtn" class="nav-button active">历史追踪</button>
            <button id="realtimeTrackingBtn" class="nav-button">实时追踪</button>
            <!-- 其他导航链接如果需要可以加在这里 -->
        </nav>
        <div class="user-info">
            <a href="/index" class="button home-button">返回主页</a>
            <span>欢迎, <span id="username-display"></span> (<span id="role-display"></span>)</span>
            <button id="logout-button">退出</button>
        </div>
    </header>

    <div class="container">
        <!-- 旧的 div.navbar 已被移除 -->
        
        <div id="historyTrackingPage" class="page-content">
            <h1>历史追踪</h1>
            <p>此页面用于显示历史追踪数据。</p>
            <button>历史追踪</button>
        </div>

        <div id="realtimeTrackingPage" class="page-content hidden">
            <h1>实时追踪</h1>
            <p>此页面用于显示实时追踪数据。</p>
            <button>实时追踪</button>
        </div>
    </div>

    <script src="/static/js/auth.js" type="module"></script>
    <script src="/static/js/common.js" type="module"></script>
    <script type="module">
        import { initializeAuthenticatedPage } from '/static/js/common.js';

        document.addEventListener('DOMContentLoaded', function() {
            initializeAuthenticatedPage();

            const historyTrackingBtn = document.getElementById('historyTrackingBtn');
            const realtimeTrackingBtn = document.getElementById('realtimeTrackingBtn');
            const historyTrackingPage = document.getElementById('historyTrackingPage');
            const realtimeTrackingPage = document.getElementById('realtimeTrackingPage');

            // Ensure common.js is loaded for general button styles if needed
            // And potentially override or add specific styles for these buttons in auto_tracking.css

            historyTrackingBtn.addEventListener('click', function() {
                historyTrackingPage.classList.remove('hidden');
                realtimeTrackingPage.classList.add('hidden');
                historyTrackingBtn.classList.add('active');
                realtimeTrackingBtn.classList.remove('active');
            });

            realtimeTrackingBtn.addEventListener('click', function() {
                realtimeTrackingPage.classList.remove('hidden');
                historyTrackingPage.classList.add('hidden');
                realtimeTrackingBtn.classList.add('active');
                historyTrackingBtn.classList.remove('active');
            });
        });
    </script>
</body>
</html>
